name: Auto Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release (e.g., 1.0.0)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test ./...

  build-and-release:
    needs: test
    permissions:
      contents: write
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Build
        run: bash -euo pipefail build.sh

      - name: Package and Checksum
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Source-game-builder-tool-macos.app ../Source-game-builder-tool-macos.zip
          cd ..
          shasum -a 256 Source-game-builder-tool-macos.zip > Source-game-builder-tool-macos.zip.sha256

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" \
            Source-game-builder-tool-macos.zip \
            Source-game-builder-tool-macos.zip.sha256 \
            --title "Release v${{ github.event.inputs.version }}" \
            --latest
