name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test ./...

      - name: Build
        run: bash -euo pipefail build.sh

      - name: Package and Checksum
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Source-game-builder-tool-macos.app ../Source-game-builder-tool-macos.zip
          cd ..
          shasum -a 256 Source-game-builder-tool-macos.zip > Source-game-builder-tool-macos.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          files: |
            Source-game-builder-tool-macos.zip
            Source-game-builder-tool-macos.zip.sha256
          make_latest: true
